<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Karim Bank 😎</title>

<style>
body {
    text-align: center;
    background: linear-gradient(135deg, black, #0f2027);
    color: white;
    font-family: Arial;
    overflow: hidden;
}

h1 {
    font-size: 40px;
}

img {
    margin: 10px;
    border-radius: 10px;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    margin: 10px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
}

#yesBtn {
    background: green;
    color: white;
}

#runBtn {
    position: absolute;
    background: red;
    color: white;
}

.money {
    position: absolute;
    width: 40px;
    animation: fall linear infinite;
}

@keyframes fall {
    from { top: -50px; }
    to { top: 100vh; }
}
</style>
</head>

<body>

<h1>🏦 Karim Bank 😎</h1>

<img src="ayoub.jpg" width="200">
<img src="karim.jpeg" width="200">
<img src="police.png.webp" width="200">

<h2>واش بغيتي تربح فلوس؟ 💸💸</h2>

<button id="yesBtn" onclick="like()">نعم 😍🔥</button>
<button id="runBtn" onmouseover="runAway()">لا 😜</button>

<p id="msg" style="margin-top:50px; font-size:20px;"></p>

<audio id="sound" src="https://www.soundjay.com/button/beep-07.mp3"></audio>

<script>
function like() {
    document.getElementById("msg").innerHTML = "😎🔥 مرحبا بك ف Karim Bank 💸";
    document.getElementById("sound").play();
}

function runAway() {
    let btn = document.getElementById("runBtn");
    btn.style.top = Math.random() * 400 + "px";
    btn.style.left = Math.random() * 400 + "px";
}

// rain money
for (let i = 0; i < 30; i++) {
    let img = document.createElement("img");
    img.src = "https://cdn-icons-png.flaticon.com/512/2331/2331943.png";
    img.className = "money";
    img.style.left = Math.random() * 100 + "vw";
    img.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(img);
}
</script>

</body>
</html>
